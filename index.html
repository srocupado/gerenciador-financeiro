<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!--
  ╔══════════════════════════════════════════════════════════╗
  ║  CACHE BUSTER — atualize o número abaixo toda vez que   ║
  ║  subir arquivos novos no GitHub. Use a data do dia:     ║
  ║  ex: 20260511, 20260512 …                               ║
  ╚══════════════════════════════════════════════════════════-->
  <script>window._V = "20260511g";</script>
  <script>
    // injeta CSS com cache-busting
    const _link = document.createElement("link");
    _link.rel = "stylesheet";
    _link.href = "styles.css?v=" + window._V;
    document.head.appendChild(_link);
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

  <!--
    Os arquivos locais são carregados via script abaixo com ?v=_V
    para forçar o navegador a buscar a versão mais recente.
    Não adicione <script type="text/babel" src="..."> manualmente aqui.
  -->
  <script>
    (function() {
      const V = window._V;
      const files = [
        "src/cloud.jsx",
        "src/store.jsx",
        "src/categories.jsx",
        "src/sidebar.jsx",
        "src/dashboard.jsx",
        "src/cartao.jsx",
        "src/banco.jsx",
        "src/tesouro.jsx",
        "src/investimentos.jsx",
        "src/app.jsx",
      ];
      files.forEach(function(f) {
        const s = document.createElement("script");
        s.type = "text/babel";
        s.setAttribute("data-presets", "react");
        s.src = f + "?v=" + V;
        document.body.appendChild(s);
      });
      // Babel detecta scripts type="text/babel" automaticamente via MutationObserver.
      // NÃO chame transformScriptTags() manualmente — isso causa processamento duplicado
      // e erros de redeclaração de identificadores.
    })();
  </script>
</body>
</html>
